<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;

        }

        .bgoverlay {
            position: absolute;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100%;
            background: radial-gradient(#10130c, #000000 90%);
            opacity: 0.7;
            z-index: 0;

        }



        .container {
            display: grid;
            min-height: 100vh;
            grid-template-rows: 10fr 90fr;
            grid-template-areas: "header"
                "main";

            background-image: url(bg/bg5.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }



        .container h6 {
            font-family: Georgia, serif;
            font-size: 3em;
            letter-spacing: 2px;
            word-spacing: 2px;
            color: #ffffff;
            filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.5));
        }

        .title {
            text-shadow: #000000 0px 0px 5px, #000000 0px 0px 10px, #000000 0px 0px 15px, #000000 0px 0px 20px, #000000 0px 0px 30px, #000000 0px 0px 40px, #000000 0px 0px 50px, #000000 0px 0px 75px;
            color: #FFFFFF;
        }

        .container p {
            font-size: 0.2;

            filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.5));
            font-family: Georgia, serif;
            letter-spacing: 2px;
            word-spacing: 2px;
            color: #ffffff;
        }

        .container header {
            position: relative;
            z-index: 1;
        }

        .container main {
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .logo {
            height: 40px;
            width: auto;
        }

        .container nav {
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 40px;
        }



        .container a {
            text-decoration: none;
            color: rgb(255, 255, 255);
            font-size: 18px;
            border-radius: 3px;
            align-items: center;
            display: flex;
            justify-content: center;
            transition: ease-in-out 0.2s;
        }

        .container a:hover {
            color: black;
        }

        .links {
            display: flex;
            gap: 30px;
            justify-content: flex-end;
            width: 100%;
            height: 40px;
        }



        .container2 {
            display: grid;
            min-height: 150vh;
            grid-template-rows: 1fr;
            grid-template-areas:
                "main";

            background-color: #2f3825;
        }

        .container2 main {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }


        .fcontainer {
            width: 80vw;
            height: 140vh;
            background-color: white;
            border-radius: 30px;
        }

        @media (max-width: 600px) {

            .links {
                display: flex;
                justify-content: center;
                gap: 30px;
            }

            .logo {
                display: none;
            }

        }

        @media (max-width: 470px) {

            body {
                overflow-x: hidden;
            }

            .container h6 {
                font-size: 2em;
            }

            .container p {
                font-size: 13px;
            }


            .container a {
                font-size: 20px;
            }

            .links {
                justify-content: center;
                gap: 20px;
            }


        }
    </style>
</head>

<body>

    <div class="container">
        <div class="bgoverlay"></div>
        <header>
            <nav>
                <div><img class="logo" src="logo.png" alt="logo"></div>
                <div class="links">
                    <a href="home.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="content.html">Content</a>
                    <a href="booknow.html">Book now</a>

                </div>
            </nav>
        </header>

        <main>
            <div style="height: 100%; width: 100%; display: flex; align-items: center; justify-content: center;">
                <div style="padding: 0 11vw; text-align: center; display: flex; align-items: center; flex-direction: column;"
                    class="title">
                    <h6>Book Your Event</h6>
                    <p>Let's make your special day unforgettable</p>
                </div>
            </div>
        </main>
    </div>

    <div class="container2">
        <main>
            <div class="fcontainer">
                <h1 style="text-align: center; padding: 30px;">BOOKING FORM</h1>   

            </div>
        </main>

    </div>

</body>

</html>
